# docker-compose.yml

version: '3.8'

services:
  ai-research-agent:
    build: .
    container_name: ai-research-agent
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./database:/app/database
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4-turbo-preview
      - APP_DEBUG=False
    restart: unless-stopped
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
